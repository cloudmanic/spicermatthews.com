            - paragraph [ref=e80]: I've been living in the terminal with Claude Code, Neovim, and tmux. But sharing screenshots with an AI that lives in a terminal session? That was broken. So I vibe coded a macOS screenshot tool that uploads to S3 and gives me a direct URL. Problem solved.
