            - paragraph [ref=e72]: MCP servers flood your AI agent's context window with massive JSON payloads. A CLI gives it exactly what it needs. Here's why I built a full Tradier brokerage CLI in Go — and why CLIs are the better interface for AI-powered trading workflows.
