            - paragraph [ref=e56]: I went full circle back to the terminal, but Vim never quite fit. So I vibe coded SpiceEdit — a mouse-first terminal code editor for engineers who live in tmux and SSH, without a four-thousand-line vimrc. One Go binary. MIT licensed. Free forever.
