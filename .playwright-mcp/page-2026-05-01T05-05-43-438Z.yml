            - paragraph [ref=e64]: For 15 years I had a CPA I trusted. She worked from home, we did almost everything by email, and tax season felt manageable. Since she retired I've been trying to find that same relationship — digital-first, responsive, and organized — and I haven't. Here's what I'm looking for.
